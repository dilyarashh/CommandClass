services:
  users-db:
    image: postgres:16
    container_name: pottery-db
    environment:
      POSTGRES_DB: pottery
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "56000:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5